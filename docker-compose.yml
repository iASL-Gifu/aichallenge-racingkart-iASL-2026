x-autoware-base: &autoware-base
  image: "aichallenge-2025-dev"
  privileged: true
  pull_policy: never
  network_mode: host
  environment:
    - DISPLAY=${DISPLAY}
    - USER=${USER}
    - ROS_DISTRO=humble
    - XAUTHORITY=${XAUTHORITY}
    - QT_X11_NO_MITSHM=1
    - TZ=Asia/Tokyo
    - RUN_MODE=
    - CMD=
    - AWSIM_TITLE_REGEX=${AWSIM_TITLE_REGEX:-}
    - AWSIM_CLASS_REGEX=${AWSIM_CLASS_REGEX:-}
    - RVIZ_TITLE_REGEX=${RVIZ_TITLE_REGEX:-}
    - RVIZ_CLASS_REGEX=${RVIZ_CLASS_REGEX:-}
    - MOVE_WINDOW_DEBUG=${MOVE_WINDOW_DEBUG:-0}
    - MOVE_WINDOW_PREFER_LARGEST=${MOVE_WINDOW_PREFER_LARGEST:-1}
    - MOVE_WINDOW_QUIET=${MOVE_WINDOW_QUIET:-1}
    # GPU (set by Makefile when DEVICE enables GPU, otherwise empty)
    - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-}
    - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-}
  volumes:
    - ./output:${OUTPUT_ROOT:-/output}
    - ./aichallenge:/aichallenge
    - ./remote:/remote
    - ./vehicle:/vehicle
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - /dev/dri:/dev/dri
    - ${XAUTHORITY}:${XAUTHORITY}:rw
  devices:
    - /dev/dri
    - /dev/video0
    - /dev/input
  working_dir: /aichallenge

x-racing_kart_interface-base: &racing_kart_interface-base
  image: "ghcr.io/tier4/racing_kart_interface:latest-experiment"
  privileged: true
  pull_policy: never
  network_mode: host
  environment:
    - DISPLAY=${DISPLAY}
    - USER=${USER}
    - TZ=Asia/Tokyo
    - ROS_DISTRO=humble
    - NTRIP_USERNAME=${NTRIP_USERNAME:-}
    - NTRIP_PASSWORD=${NTRIP_PASSWORD:-}
  volumes:
    - /dev/vcu:/dev/vcu
    - /dev/gnss:/dev/gnss
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - /dev/dri:/dev/dri
  devices:
    - /dev/dri
  group_add:
    - dialout
  working_dir: /workspace

services:
  # Autoware service
  autoware:
    <<: *autoware-base 
    stop_grace_period: 0.1s
    working_dir: ${OUTPUT_RUN_DIR:-/aichallenge}
    command: ["bash", "-lc", "if [ \"${EVAL_RUN:-0}\" = \"1\" ]; then exec /aichallenge/run_autoware.bash ${RUN_MODE:-awsim} ${DOMAIN_ID:-1} >autoware.log 2>&1; else exec /aichallenge/run_autoware.bash ${RUN_MODE:-awsim} ${DOMAIN_ID:-1}; fi"]

  # Autoware service
  autoware-build:
    <<: *autoware-base 
    stop_grace_period: 0.1s
    command: ["bash", "-lc", "exec bash /aichallenge/build_autoware.bash ${HOST_UID:-} ${HOST_GID:-}"]

  simulator:
    <<: *autoware-base 
    stop_grace_period: 0.1s
    working_dir: ${OUTPUT_RUN_DIR:-/aichallenge}
    command: ["bash", "-lc", "if [ \"${EVAL_RUN:-0}\" = \"1\" ]; then exec /aichallenge/run_simulator.bash ${SIM_MODE:-} >awsim.log 2>&1; else exec /aichallenge/run_simulator.bash ${SIM_MODE:-}; fi"]

  autoware-command:
    <<: *autoware-base 
    stop_grace_period: 0.1s
    command: ["bash", "-lc", "source /aichallenge/workspace/install/setup.bash && cd ${CMD_WORKDIR:-/aichallenge} && exec ${CMD:-}"]

  autoware-rosbag:
    <<: *autoware-base
    stop_signal: SIGINT
    stop_grace_period: 30s
    working_dir: ${OUTPUT_RUN_DIR:-/aichallenge}
    command: ["bash", "-lc", "exec env ROS_DOMAIN_ID=${DOMAIN_ID:-1} /aichallenge/utils/record_rosbag.bash"]

#### vehicle specific services can be added here ####
  # Zenoh service
  zenoh:
    <<: *autoware-base
    stop_grace_period: 0.1s
    working_dir: /vehicle
    command: ["bash", "-c", "case ${VEHICLE_ID:-} in A2) PORT=7448;; A3) PORT=7449;; A6) PORT=7450;; A7) PORT=7451;; *) echo 'Invalid VEHICLE_ID'; exit 1;; esac && zenoh-bridge-ros2dds client -e tls/zenoh.dev.aichallenge-board.jsae.or.jp:$$PORT -c /vehicle/zenoh.json5"]

  # Driver service
  driver:
    <<: *racing_kart_interface-base
    stop_grace_period: 0.1s
    command: ['vehicle']

#### remote visualization services ####
  rviz2:
    <<: *autoware-base 
    stop_grace_period: 0.1s
    command: ["bash", "-c", "cd /aichallenge && exec bash utils/run_rviz.bash remote"]
